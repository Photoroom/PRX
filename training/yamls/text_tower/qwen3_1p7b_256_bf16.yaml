# Qwen3-1.7B Text Tower (256 max length, bf16)
# Decoder-only model, hidden_size=2048, ~3.4GB VRAM
# Closest in size to the current T5-Gemma-2B (hidden_size=2304)
model_name: Qwen/Qwen3-1.7B
prompt_max_tokens: 256
use_attn_mask: true
use_last_hidden_state: true
torch_dtype: torch.bfloat16
skip_text_cleaning: true
