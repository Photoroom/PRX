# @package _global_
defaults:
  - JIT-Baseline
  - _self_

name: Muon_fsdp

# Muon optimizer: 2D weight matrices in blocks use Newton-Schulz
# orthogonalization, everything else falls back to Adam.
optimizer:
  _target_: optimizer.create_muon_optimizer
  _recursive_: false
  muon_config:
    lr: 1.0e-4
    momentum: 0.95
    nesterov: true
    ns_steps: 5
    rms_scale: true
    weight_decay: 0.
  adam_config:
    lr: 1.0e-4
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.

trainer:
  save_folder: checkpoints/JIT-Muon